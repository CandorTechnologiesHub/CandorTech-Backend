# --- Dev Profile --------------------------------------------------------------
# All environment-specific values are loaded from .env (see .env.example).
# Contributors: copy .env.example to .env and fill in your local values.
# Do NOT commit .env -- it is gitignored.

# --- Database -----------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JWT ----------------------------------------------------------------------
app.security.jwt.secret=${JWT_SECRET}

# --- CORS ---------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Email --------------------------------------------------------------------
mail.service.provider=${MAIL_PROVIDER}
mail.sendgrid.api-key=${SENDGRID_API_KEY}

# SMTP (JavaMail)
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

# --- Logging ------------------------------------------------------------------
logging.level.com.candortech=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
