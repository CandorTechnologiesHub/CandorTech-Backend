# --- Prod Profile -------------------------------------------------------------
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All sensitive values MUST be supplied via environment variables.
# The application will fail to start if required env vars are missing.

# --- Database -----------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JWT ----------------------------------------------------------------------
# Minimum 256-bit (32-character) random secret -- generate with:
#   openssl rand -hex 64
app.security.jwt.secret=${JWT_SECRET}
# Optional: shorten session lifetime in prod (default 24 h)
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- CORS ---------------------------------------------------------------------
# Comma-separated list of allowed frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.candornexus.org}

# --- Email --------------------------------------------------------------------
mail.service.provider=${MAIL_PROVIDER:sendgrid}
mail.sendgrid.api-key=${SENDGRID_API_KEY}

# SMTP (JavaMail fallback)
spring.mail.host=${SMTP_HOST:smtppro.zoho.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

# --- Frontend URLs ------------------------------------------------------------
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:https://app.candornexus.org/reset-password}

# --- Logging ------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.candortech=INFO
