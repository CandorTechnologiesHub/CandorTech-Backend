# --- Active Profile -----------------------------------------------------------
# Override externally in production: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=dev

# --- Config Import ------------------------------------------------------------
# Loads .env from the project root into Spring's environment.
# optional: means startup does not fail if .env is absent (e.g. production).
# Contributors: copy .env.example -> .env and fill in local values.
spring.config.import=optional:file:.env[.properties]

# --- Server -------------------------------------------------------------------
server.port=8081

# --- Database -----------------------------------------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# --- Flyway --------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT ----------------------------------------------------------------------
# Secret and expiry are profile-specific; header/prefix are universal
app.security.jwt.header=Authorization
app.security.jwt.token-prefix=Bearer
app.security.jwt.expiration-ms=86400000

# --- Google SSO ---------------------------------------------------------------
app.security.google.client-id=${GOOGLE_OAUTH2_CLIENT_ID:}

# --- Password Reset -----------------------------------------------------------
app.security.password-reset.token-expiry-minutes=30

# --- CORS ---------------------------------------------------------------------
# Allowed origins are profile-specific (comma-separated)
app.cors.max-age-seconds=3600

# --- Email --------------------------------------------------------------------
mail.from.email=noreply@candornexus.org
mail.from.name=CanDor
mail.templates.otp-registration-subject=Verify your CanDor account
mail.templates.otp-login-mfa-subject=Your CanDor login code
mail.templates.otp-password-reset-subject=Your CanDor password reset code
mail.templates.otp-phone-change-subject=Verify your new phone number
mail.templates.otp-email-change-subject=Verify your new email address
mail.templates.reset-password-subject=Reset Your CanDor Password

# --- Email Retry --------------------------------------------------------------
mail.retry.max-attempts=3
mail.retry.initial-interval-ms=1000
mail.retry.multiplier=2.0
mail.retry.max-interval-ms=10000

# --- SMTP Properties (shared; credentials are profile-specific) ---------------
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Async Executor -----------------------------------------------------------
async.executor.core-pool-size=5
async.executor.max-pool-size=10
async.executor.queue-capacity=200
async.executor.thread-name-prefix=CandorAsync-
async.executor.keep-alive-seconds=60
async.executor.await-termination-seconds=30

# --- OpenAPI / Swagger --------------------------------------------------------
app.openapi.group=candortech
app.openapi.paths-to-match=/api/**/**
app.openapi.title=CanDor API
app.openapi.version=1.0
app.openapi.description=API documentation for CanDor Technologies
app.openapi.contact-name=Innocent Udo
app.openapi.contact-email=innocentcharlesudo@gmail.com
